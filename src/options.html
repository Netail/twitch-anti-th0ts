<!DOCTYPE html>
<html>

<head>
    <title>Twitch Anti Th0ts - Settings</title>
    <style>
        * {
            font-size: 16px;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .submitButton {
            background-color: #9146FF;
            color: white;
            width: 100%;
            border-radius: 8px;
            border: 0;
            padding: 6px 0;

            &:active {
                background-color: #7f3de2;
            }

            &:hover {
                cursor: pointer;
            }
        }
    </style>
</head>

<body>
    <form id="settings" class="form">
        <div>
            <label for="disable-users">Disable user filtering:</label>
            <input type="checkbox" id="disable-users" />
        </div>
        <div>
            <label for="disable-keywords">Disable keyword filtering:</label>
            <input type="checkbox" id="disable-keywords" />
        </div>
        <div>
            <label for="debug-mode">Debug mode (border instead of blur):</label>
            <input type="checkbox" id="debug-mode" />
        </div>

        <button class="submitButton" type="submit">Save</button>

        <span id="status" hidden></span>
    </form>

    <script src="./options.js"></script>
</body>

</html>
